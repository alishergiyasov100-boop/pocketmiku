<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Miku</title>
<style>
  html, body { margin: 0; padding: 0;
    background: linear-gradient(180deg, #1A0E2E 0%, #0A0612 55%, #000000 100%);
    overflow: hidden; height: 100%; }
  #c { display: block; width: 100vw; height: 100vh; touch-action: none; }
  #err { position: fixed; left: 8px; top: 60px; color: #ff7676; font: 12px/1.3 monospace;
         background: rgba(0,0,0,0.75); padding: 6px 10px; border-radius: 6px; max-width: 80vw;
         z-index: 9999; white-space: pre-wrap; word-break: break-all; }
  #stat { position: fixed; right: 8px; top: 60px; color: #36DBC0; font: 11px/1.3 monospace;
          background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; z-index: 9999; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="err" style="display:none"></div>
<div id="stat">booting…</div>

<script src="miku-bundle.min.js"></script>
<script>
const errBox = document.getElementById('err');
const statBox = document.getElementById('stat');
function showErr(msg) {
  errBox.style.display = 'block';
  errBox.textContent = msg;
  if (window.MikuBridge) window.MikuBridge.onError(String(msg));
}
function setStat(s) { statBox.textContent = s; }
window.onerror = (m, src, l, c, e) => showErr((e && e.stack) || m);
window.addEventListener('unhandledrejection', (ev) => showErr('promise: ' + (ev.reason?.stack || ev.reason)));

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({
  canvas, antialias: true, alpha: false,
  powerPreference: 'high-performance',
});
const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
renderer.setPixelRatio(pixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight, false);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.setClearColor(0x0A0612, 1);

setStat('GL ' + canvas.width + 'x' + canvas.height + ' pr=' + pixelRatio);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.05, 100);
camera.position.set(0, 1.35, 1.6);
camera.lookAt(0, 1.35, 0);

// Тест-куб (розовый) — проверка что рендер живой
const testCube = new THREE.Mesh(
  new THREE.BoxGeometry(0.2, 0.2, 0.2),
  new THREE.MeshStandardMaterial({ color: 0xff44aa })
);
testCube.position.set(0.5, 1.35, 0);
scene.add(testCube);

const hemi = new THREE.HemisphereLight(0xffffff, 0x444466, 0.6);
scene.add(hemi);
const dir = new THREE.DirectionalLight(0xffffff, 1.0);
dir.position.set(1, 2, 1);
scene.add(dir);

let currentVrm = null;

async function loadVrm(url) {
  try {
    setStat('loading vrm…');
    const loader = new GLTFLoader();
    loader.register((parser) => new VRMLoaderPlugin(parser));

    const gltf = await loader.loadAsync(url, (ev) => {
      if (ev.total) setStat('vrm ' + Math.round(100 * ev.loaded / ev.total) + '%');
    });
    const vrm = gltf.userData.vrm;
    if (!vrm) { showErr('vrm meta missing'); setStat('no vrm meta'); return; }

    VRMUtils.removeUnnecessaryVertices(gltf.scene);
    VRMUtils.removeUnnecessaryJoints(gltf.scene);
    vrm.scene.traverse((o) => { if (o.isMesh) o.frustumCulled = false; });

    if (vrm.expressionManager) vrm.expressionManager.setValue('neutral', 1.0);

    vrm.scene.rotation.y = Math.PI;
    scene.add(vrm.scene);
    currentVrm = vrm;

    const bbox = new THREE.Box3().setFromObject(vrm.scene);
    const size = new THREE.Vector3();
    bbox.getSize(size);
    const headY = bbox.max.y - size.y * 0.1;
    camera.position.set(0, headY, size.y * 1.0);
    camera.lookAt(0, headY - size.y * 0.08, 0);

    if (window.MikuBridge) window.MikuBridge.onVrmLoaded(vrm.meta?.name || 'Miku');
  } catch (e) {
    showErr('vrm load: ' + (e?.stack || e?.message || e));
    setStat('vrm FAILED');
  }
}

const clock = new THREE.Clock();
let frameCount = 0;
let lastFpsT = performance.now();
function tick() {
  const dt = clock.getDelta();
  if (currentVrm) currentVrm.update(dt);
  renderer.render(scene, camera);
  frameCount++;
  const now = performance.now();
  if (now - lastFpsT > 1000) {
    const fps = Math.round(frameCount * 1000 / (now - lastFpsT));
    frameCount = 0;
    lastFpsT = now;
    const calls = renderer.info.render.calls;
    const tris = renderer.info.render.triangles;
    if (currentVrm) setStat('fps ' + fps + ' calls ' + calls + ' tri ' + tris);
  }
  requestAnimationFrame(tick);
}
tick();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight, false);
});

window.Miku = {
  loadVrm: (path) => loadVrm(path),
  setLipSync: (amp) => {
    if (!currentVrm?.expressionManager) return;
    currentVrm.expressionManager.setValue('aa', Math.max(0, Math.min(1, amp)));
  },
  setExpression: (name, value) => {
    if (!currentVrm?.expressionManager) return;
    currentVrm.expressionManager.setValue(name, Math.max(0, Math.min(1, value)));
  },
  setLookAt: (yawDeg, pitchDeg) => {
    if (!currentVrm?.humanoid) return;
    const head = currentVrm.humanoid.getNormalizedBoneNode('head');
    if (head) head.rotation.set(
      THREE.MathUtils.degToRad(pitchDeg),
      THREE.MathUtils.degToRad(yawDeg), 0);
  },
};

loadVrm('miku.vrm');

setInterval(() => {
  if (!currentVrm?.expressionManager) return;
  currentVrm.expressionManager.setValue('blink', 1.0);
  setTimeout(() => currentVrm?.expressionManager?.setValue('blink', 0.0), 120);
}, 3500 + Math.random() * 2000);
</script>
</body>
</html>
