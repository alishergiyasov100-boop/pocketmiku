<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Miku</title>
<style>
  html, body { margin: 0; padding: 0;
    background: linear-gradient(180deg, #1A0E2E 0%, #0A0612 55%, #000000 100%);
    overflow: hidden; height: 100%; }
  #c { display: block; width: 100vw; height: 100vh; touch-action: none; }
  #err { position: fixed; left: 8px; top: 60px; color: #ff7676; font: 12px/1.3 monospace;
         background: rgba(0,0,0,0.75); padding: 6px 10px; border-radius: 6px; max-width: 80vw;
         z-index: 9999; white-space: pre-wrap; word-break: break-all; }
  #stat { position: fixed; right: 8px; top: 60px; color: #36DBC0; font: 11px/1.3 monospace;
          background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; z-index: 9999; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="err" style="display:none"></div>
<div id="stat">booting…</div>

<script src="miku-bundle.min.js"></script>
<script>
const errBox = document.getElementById('err');
const statBox = document.getElementById('stat');
function showErr(msg) {
  errBox.style.display = 'block';
  // накапливаем — иначе теряем первую ошибку при второй
  const existing = errBox.textContent;
  errBox.textContent = (existing ? existing + '\n' : '') + msg;
  if (window.MikuBridge) window.MikuBridge.onError(String(msg));
}
function setStat(s) { statBox.textContent = s; }
window.onerror = (m, src, l, c, e) => showErr((e && e.stack) || m);
window.addEventListener('unhandledrejection', (ev) => showErr('promise: ' + (ev.reason?.stack || ev.reason)));

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({
  canvas, antialias: true, alpha: false,
  powerPreference: 'high-performance',
});
const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
renderer.setPixelRatio(pixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight, false);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.25;
renderer.setClearColor(0x0A0612, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.05, 100);
camera.position.set(0, 1.35, 1.6);
camera.lookAt(0, 1.35, 0);

// ── 3-point lighting + rim (как у Ani) ────────────────────────────────────
scene.add(new THREE.HemisphereLight(0xFFE9F2, 0x2A1840, 0.9));
const keyLight = new THREE.DirectionalLight(0xFFFFFF, 1.5);
keyLight.position.set(1.2, 2.5, 1.5); scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0x88FFEE, 0.55);
fillLight.position.set(-1.5, 1.2, 0.8); scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0xFF66CC, 1.2);
rimLight.position.set(-0.5, 2.0, -2.0); scene.add(rimLight);

let currentVrm = null;
let mixer = null;
// {name: AnimationClip} — preloaded VRMA клипы
const clipBank = {};
let activeAction = null;
let idleAction = null;
let inGesture = false;
// Idle-pool: переключается между этими случайно каждые 15-30 сек (живее чем один loop)
const IDLE_POOL = ['Relax', 'LookAround', 'Thinking', 'Sleepy'];
const IDLE_CLIP = 'Relax';
// порядок предзагрузки (Relax первым — он же initial idle)
const VRMA_LIST = ['Relax', 'Angry', 'Blush', 'Clapping', 'Goodbye', 'Jump',
                   'LookAround', 'Sad', 'Sleepy', 'Surprised', 'Thinking'];

// Один loader с обоими плагинами (official pixiv pattern)
const gltfLoader = new GLTFLoader();
gltfLoader.crossOrigin = 'anonymous';
gltfLoader.register((parser) => new VRMLoaderPlugin(parser));
gltfLoader.register((parser) => new VRMAnimationLoaderPlugin(parser));

async function loadVrm(url) {
  try {
    setStat('loading vrm…');
    const gltf = await gltfLoader.loadAsync(url, (ev) => {
      if (ev.total) setStat('vrm ' + Math.round(100 * ev.loaded / ev.total) + '%');
    });
    const vrm = gltf.userData.vrm;
    if (!vrm) { showErr('vrm meta missing'); return; }

    VRMUtils.removeUnnecessaryVertices(gltf.scene);
    VRMUtils.removeUnnecessaryJoints(gltf.scene);
    vrm.scene.traverse((o) => {
      if (o.isMesh) {
        o.frustumCulled = false;
        if (o.material) {
          const mats = Array.isArray(o.material) ? o.material : [o.material];
          mats.forEach((m) => {
            if (m.emissive) m.emissive.setHex(0x1A1A22);
            if (m.emissiveIntensity !== undefined) m.emissiveIntensity = 0.3;
          });
        }
      }
    });

    if (vrm.expressionManager) vrm.expressionManager.setValue('neutral', 1.0);

    // VRM 0.x смотрит -Z, VRM 1.0 смотрит +Z. Авто-определяем.
    const isVrm1 = vrm.meta?.metaVersion === '1';
    if (!isVrm1) {
      vrm.scene.rotation.y = Math.PI;
    }
    scene.add(vrm.scene);
    currentVrm = vrm;
    mixer = new THREE.AnimationMixer(vrm.scene);
    // Когда non-idle клип заканчивается — возврат в idle pool (рандомный)
    mixer.addEventListener('finished', () => {
      inGesture = false;
      pickRandomIdle();
    });

    const bbox = new THREE.Box3().setFromObject(vrm.scene);
    const size = new THREE.Vector3();
    bbox.getSize(size);
    const headY = bbox.max.y - size.y * 0.1;
    camera.position.set(0, headY, size.y * 1.0);
    camera.lookAt(0, headY - size.y * 0.08, 0);

    setStat('loading clips…');
    await preloadClips();
    if (window.MikuBridge) window.MikuBridge.onVrmLoaded(vrm.meta?.name || 'Miku');
  } catch (e) {
    showErr('vrm load: ' + (e?.stack || e?.message || e));
  }
}

async function loadVrma(name) {
  const url = '../animations/' + name + '.vrma';
  let gltf;
  try {
    gltf = await gltfLoader.loadAsync(url);
  } catch (e) {
    throw new Error('fetch fail ' + name + ': ' + (e?.message || e));
  }
  const animations = gltf.userData.vrmAnimations;
  if (!animations || animations.length === 0) {
    throw new Error('no vrmAnimations in ' + name + ' (userData keys: ' + Object.keys(gltf.userData || {}).join(',') + ')');
  }
  const va = animations[0];
  try {
    return createVRMAnimationClip(va, currentVrm);
  } catch (e) {
    throw new Error('createClip ' + name + ': ' + (e?.message || e));
  }
}

async function preloadClips() {
  let loaded = 0;
  let firstErr = '';
  for (const name of VRMA_LIST) {
    try {
      const clip = await loadVrma(name);
      clipBank[name] = clip;
      loaded++;
      setStat('clips ' + loaded + '/' + VRMA_LIST.length);
    } catch (e) {
      if (!firstErr) firstErr = (e?.message || e) + '';
      console.error('clip ' + name + ' failed:', e);
    }
  }
  if (loaded === 0 && firstErr) showErr('VRMA: ' + firstErr);
  // запускаем idle
  if (clipBank[IDLE_CLIP] && mixer) {
    pickRandomIdle();
    setStat('ready (' + loaded + ' clips)');
    scheduleIdleSwap();
  } else {
    showErr('no idle clip "' + IDLE_CLIP + '" or no mixer');
  }
}

function pickRandomIdle() {
  if (!mixer) return;
  const pool = IDLE_POOL.filter((n) => clipBank[n]);
  if (pool.length === 0) return;
  const name = pool[Math.floor(Math.random() * pool.length)];
  const action = mixer.clipAction(clipBank[name]);
  action.setLoop(THREE.LoopRepeat, Infinity);
  crossfadeTo(action, 0.6);
  idleAction = action;
}

function scheduleIdleSwap() {
  const delay = 15000 + Math.random() * 15000;  // 15-30 сек
  setTimeout(() => {
    if (!inGesture) pickRandomIdle();
    scheduleIdleSwap();
  }, delay);
}

function crossfadeTo(newAction, duration = 0.35) {
  if (!newAction || newAction === activeAction) return;
  newAction.reset();
  newAction.setEffectiveWeight(1);
  newAction.enabled = true;
  if (activeAction) {
    newAction.crossFadeFrom(activeAction, duration, false);
  }
  newAction.play();
  activeAction = newAction;
}

function playGesture(name) {
  if (!mixer) { setStat('no mixer'); return; }
  if (!clipBank[name]) { setStat('no clip: ' + name); return; }
  const action = mixer.clipAction(clipBank[name]);
  action.setLoop(THREE.LoopOnce, 1);
  action.clampWhenFinished = false;
  inGesture = true;
  crossfadeTo(action);
  setStat('▶ ' + name);
}

// ── Blink с подмигиванием ─────────────────────────────────────────────────
function scheduleBlink() {
  const delay = 2500 + Math.random() * 3500;
  setTimeout(() => {
    if (currentVrm?.expressionManager) {
      const em = currentVrm.expressionManager;
      const wink = Math.random() < 0.15;
      if (wink) {
        const eye = Math.random() < 0.5 ? 'blinkLeft' : 'blinkRight';
        em.setValue(eye, 1.0);
        setTimeout(() => em.setValue(eye, 0.0), 250);
      } else {
        em.setValue('blink', 1.0);
        setTimeout(() => em.setValue('blink', 0.0), 130);
      }
    }
    scheduleBlink();
  }, delay);
}
scheduleBlink();

const clock = new THREE.Clock();
let frameCount = 0;
let lastFpsT = performance.now();
function tick() {
  const dt = clock.getDelta();
  if (mixer) mixer.update(dt);
  if (currentVrm) currentVrm.update(dt);
  renderer.render(scene, camera);
  frameCount++;
  const now = performance.now();
  if (now - lastFpsT > 1000) {
    const fps = Math.round(frameCount * 1000 / (now - lastFpsT));
    frameCount = 0;
    lastFpsT = now;
    if (currentVrm) setStat('fps ' + fps);
  }
  requestAnimationFrame(tick);
}
tick();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight, false);
});

// ── FBX → VRM retarget (для Hunyuan output) ──────────────────────────────
// Hunyuan возвращает FBX с SMPL/Mixamo-naming skeleton.
// Стандартный маппинг (FBX bone name → VRM normalized humanoid bone).
const SMPL_TO_VRM = {
  // основной торс
  'mixamorigHips': 'hips', 'Hips': 'hips', 'Pelvis': 'hips', 'pelvis': 'hips', 'root': 'hips',
  'mixamorigSpine': 'spine', 'Spine': 'spine', 'Spine1': 'spine', 'spine1': 'spine',
  'mixamorigSpine1': 'chest', 'Spine2': 'chest', 'spine2': 'chest', 'Chest': 'chest',
  'mixamorigSpine2': 'upperChest', 'Spine3': 'upperChest', 'spine3': 'upperChest',
  'mixamorigNeck': 'neck', 'Neck': 'neck', 'neck': 'neck',
  'mixamorigHead': 'head', 'Head': 'head', 'head': 'head',
  // ноги
  'mixamorigLeftUpLeg': 'leftUpperLeg', 'LeftUpLeg': 'leftUpperLeg', 'L_Hip': 'leftUpperLeg', 'left_hip': 'leftUpperLeg', 'LeftThigh': 'leftUpperLeg',
  'mixamorigRightUpLeg': 'rightUpperLeg', 'RightUpLeg': 'rightUpperLeg', 'R_Hip': 'rightUpperLeg', 'right_hip': 'rightUpperLeg', 'RightThigh': 'rightUpperLeg',
  'mixamorigLeftLeg': 'leftLowerLeg', 'LeftLeg': 'leftLowerLeg', 'L_Knee': 'leftLowerLeg', 'left_knee': 'leftLowerLeg', 'LeftShin': 'leftLowerLeg',
  'mixamorigRightLeg': 'rightLowerLeg', 'RightLeg': 'rightLowerLeg', 'R_Knee': 'rightLowerLeg', 'right_knee': 'rightLowerLeg', 'RightShin': 'rightLowerLeg',
  'mixamorigLeftFoot': 'leftFoot', 'LeftFoot': 'leftFoot', 'L_Ankle': 'leftFoot', 'left_ankle': 'leftFoot',
  'mixamorigRightFoot': 'rightFoot', 'RightFoot': 'rightFoot', 'R_Ankle': 'rightFoot', 'right_ankle': 'rightFoot',
  'mixamorigLeftToeBase': 'leftToes', 'LeftToes': 'leftToes', 'L_Foot': 'leftToes', 'left_foot': 'leftToes',
  'mixamorigRightToeBase': 'rightToes', 'RightToes': 'rightToes', 'R_Foot': 'rightToes', 'right_foot': 'rightToes',
  // плечевой пояс
  'mixamorigLeftShoulder': 'leftShoulder', 'LeftShoulder': 'leftShoulder', 'L_Collar': 'leftShoulder', 'left_collar': 'leftShoulder',
  'mixamorigRightShoulder': 'rightShoulder', 'RightShoulder': 'rightShoulder', 'R_Collar': 'rightShoulder', 'right_collar': 'rightShoulder',
  // руки
  'mixamorigLeftArm': 'leftUpperArm', 'LeftArm': 'leftUpperArm', 'L_Shoulder': 'leftUpperArm', 'left_shoulder': 'leftUpperArm',
  'mixamorigRightArm': 'rightUpperArm', 'RightArm': 'rightUpperArm', 'R_Shoulder': 'rightUpperArm', 'right_shoulder': 'rightUpperArm',
  'mixamorigLeftForeArm': 'leftLowerArm', 'LeftForeArm': 'leftLowerArm', 'L_Elbow': 'leftLowerArm', 'left_elbow': 'leftLowerArm',
  'mixamorigRightForeArm': 'rightLowerArm', 'RightForeArm': 'rightLowerArm', 'R_Elbow': 'rightLowerArm', 'right_elbow': 'rightLowerArm',
  'mixamorigLeftHand': 'leftHand', 'LeftHand': 'leftHand', 'L_Wrist': 'leftHand', 'left_wrist': 'leftHand',
  'mixamorigRightHand': 'rightHand', 'RightHand': 'rightHand', 'R_Wrist': 'rightHand', 'right_wrist': 'rightHand',
};

function retargetFbxToVrm(fbxGroup, vrm) {
  if (!vrm?.humanoid || !fbxGroup?.animations || fbxGroup.animations.length === 0) {
    throw new Error('no animations or no VRM humanoid');
  }
  const srcClip = fbxGroup.animations[0];
  const tracks = [];
  const observedBones = new Set();

  for (const track of srcClip.tracks) {
    // имя трека: "BoneName.position" / "BoneName.quaternion" / "BoneName.scale"
    const dotIdx = track.name.lastIndexOf('.');
    if (dotIdx < 0) continue;
    const srcBone = track.name.substring(0, dotIdx);
    const prop = track.name.substring(dotIdx + 1);

    observedBones.add(srcBone);

    const vrmBoneName = SMPL_TO_VRM[srcBone];
    if (!vrmBoneName) continue;

    const targetNode = vrm.humanoid.getNormalizedBoneNode(vrmBoneName);
    if (!targetNode) continue;

    // оставляем только rotation (quaternion) — position только для hips
    if (prop === 'quaternion') {
      tracks.push(new THREE.QuaternionKeyframeTrack(
        targetNode.name + '.quaternion',
        track.times,
        track.values,
        track.getInterpolation(),
      ));
    } else if (prop === 'position' && vrmBoneName === 'hips') {
      // position только для hips чтобы не сломать pose. Scale-fix не делаем здесь.
      tracks.push(new THREE.VectorKeyframeTrack(
        targetNode.name + '.position',
        track.times,
        track.values,
        track.getInterpolation(),
      ));
    }
  }

  if (tracks.length === 0) {
    setStat('retarget: 0 tracks (bones=' + Array.from(observedBones).slice(0, 5).join(',') + '...)');
    throw new Error('no tracks matched. Source bones: ' + Array.from(observedBones).slice(0, 8).join(','));
  }

  setStat('retarget OK: ' + tracks.length + ' tracks');
  return new THREE.AnimationClip('ai_motion', srcClip.duration, tracks);
}

let aiAction = null;

function playAiMotion(fbxBase64, label) {
  try {
    if (!currentVrm || !mixer) { setStat('not ready'); return; }
    setStat('parsing FBX…');

    // base64 → Uint8Array → ArrayBuffer
    const bin = atob(fbxBase64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);

    const loader = new FBXLoader();
    const fbxGroup = loader.parse(arr.buffer, '');

    const clip = retargetFbxToVrm(fbxGroup, currentVrm);
    const action = mixer.clipAction(clip);
    action.setLoop(THREE.LoopOnce, 1);
    action.clampWhenFinished = false;
    inGesture = true;
    crossfadeTo(action, 0.3);
    aiAction = action;
    setStat('▶ AI: ' + (label || 'motion'));
  } catch (e) {
    showErr('AI motion: ' + (e?.message || e));
    setStat('AI FAIL');
    inGesture = false;
  }
}

window.Miku = {
  loadVrm: (path) => loadVrm(path),
  setLipSync: (amp) => {
    if (!currentVrm?.expressionManager) return;
    currentVrm.expressionManager.setValue('aa', Math.max(0, Math.min(1, amp)));
  },
  setExpression: (name, value) => {
    if (!currentVrm?.expressionManager) return;
    currentVrm.expressionManager.setValue(name, Math.max(0, Math.min(1, value)));
  },
  setLookAt: (yawDeg, pitchDeg) => {
    if (!currentVrm?.humanoid) return;
    const head = currentVrm.humanoid.getNormalizedBoneNode('head');
    if (head) head.rotation.set(
      THREE.MathUtils.degToRad(pitchDeg),
      THREE.MathUtils.degToRad(yawDeg), 0);
  },
  playGesture: (name) => playGesture(name),
  listGestures: () => VRMA_LIST.slice(),
  playAiMotion: (fbxBase64, label) => playAiMotion(fbxBase64, label),
};

loadVrm('../vrm/miku.vrm');
</script>
</body>
</html>
