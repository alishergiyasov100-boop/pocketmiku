<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Miku</title>
<style>
  html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; height: 100%; }
  #c { display: block; width: 100vw; height: 100vh; touch-action: none; }
  #err { position: fixed; left: 8px; top: 60px; color: #ff7676; font: 12px/1.3 monospace;
         background: rgba(0,0,0,0.75); padding: 6px 10px; border-radius: 6px; max-width: 80vw;
         z-index: 9999; white-space: pre-wrap; word-break: break-all; }
  #stat { position: fixed; right: 8px; top: 60px; color: #36DBC0; font: 11px/1.3 monospace;
          background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; z-index: 9999; }
</style>

<script type="importmap">
{
  "imports": {
    "three": "./three.module.js",
    "three/addons/utils/BufferGeometryUtils.js": "./BufferGeometryUtils.js"
  }
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="err" style="display:none"></div>
<div id="stat">booting…</div>

<script>
// module load failures не триггерят window.onerror — ловим вручную
function _showErrEarly(msg) {
  const e = document.getElementById('err');
  if (e) { e.style.display = 'block'; e.textContent = msg; }
  if (window.MikuBridge) window.MikuBridge.onError(String(msg));
}
window.addEventListener('error', (ev) => {
  if (ev.target && (ev.target.tagName === 'SCRIPT' || ev.target.tagName === 'LINK')) {
    _showErrEarly('script load fail: ' + (ev.target.src || ev.target.href));
  } else if (ev.message) {
    _showErrEarly('err: ' + ev.message + ' @' + (ev.filename || '?') + ':' + ev.lineno);
  }
}, true);
window.addEventListener('unhandledrejection', (ev) => {
  _showErrEarly('promise: ' + (ev.reason?.stack || ev.reason || 'unknown'));
});
// console.error → status плашка
const _origErr = console.error;
console.error = function(...a) { _showErrEarly('console: ' + a.join(' ')); _origErr.apply(console, a); };
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from './GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from './three-vrm.module.js';

const errBox = document.getElementById('err');
const statBox = document.getElementById('stat');
function showErr(msg) {
  errBox.style.display = 'block';
  errBox.textContent = msg;
  if (window.MikuBridge) window.MikuBridge.onError(String(msg));
}
function setStat(s) {
  statBox.textContent = s;
}
window.onerror = (m, src, l, c, e) => showErr((e && e.stack) || m);
setStat('three.js OK');

// ── Three.js scene ──────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight, false);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.05, 100);
camera.position.set(0, 1.35, 1.6);
camera.lookAt(0, 1.35, 0);

// Тест-куб справа от Miku чтоб подтвердить что рендер вообще работает
const testCube = new THREE.Mesh(
  new THREE.BoxGeometry(0.2, 0.2, 0.2),
  new THREE.MeshStandardMaterial({ color: 0xff44aa })
);
testCube.position.set(0.5, 1.35, 0);
scene.add(testCube);

const hemi = new THREE.HemisphereLight(0xffffff, 0x444466, 0.6);
scene.add(hemi);
const dir = new THREE.DirectionalLight(0xffffff, 1.0);
dir.position.set(1, 2, 1);
scene.add(dir);

let currentVrm = null;

// ── VRM loader ──────────────────────────────────────────────────────────────
async function loadVrm(url) {
  try {
    setStat('loading vrm…');
    const loader = new GLTFLoader();
    loader.register((parser) => new VRMLoaderPlugin(parser));

    const gltf = await loader.loadAsync(url, (ev) => {
      if (ev.total) setStat('vrm ' + Math.round(100 * ev.loaded / ev.total) + '%');
    });
    const vrm = gltf.userData.vrm;
    if (!vrm) { showErr('vrm metadata not found'); setStat('no vrm meta'); return; }

    VRMUtils.removeUnnecessaryVertices(gltf.scene);
    VRMUtils.removeUnnecessaryJoints(gltf.scene);
    vrm.scene.traverse((o) => { if (o.isMesh) o.frustumCulled = false; });

    if (vrm.expressionManager) {
      vrm.expressionManager.setValue('neutral', 1.0);
    }

    // Развернуть Мику лицом к камере (+Z)
    vrm.scene.rotation.y = Math.PI;
    scene.add(vrm.scene);
    currentVrm = vrm;

    // Авто-кадр: bbox модели → ставим камеру так чтобы голова была в фокусе
    const bbox = new THREE.Box3().setFromObject(vrm.scene);
    const size = new THREE.Vector3();
    const center = new THREE.Vector3();
    bbox.getSize(size);
    bbox.getCenter(center);
    const headY = bbox.max.y - size.y * 0.1;
    const distance = size.y * 1.0;
    camera.position.set(0, headY, distance);
    camera.lookAt(0, headY - size.y * 0.08, 0);

    setStat('vrm: H=' + size.y.toFixed(2) + 'm Y=' + headY.toFixed(2));
    if (window.MikuBridge) window.MikuBridge.onVrmLoaded(vrm.meta?.name || 'Miku');
  } catch (e) {
    showErr('vrm load: ' + (e?.stack || e?.message || e));
    setStat('vrm FAILED');
  }
}

// ── Animation loop ──────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function tick() {
  const dt = clock.getDelta();
  if (currentVrm) currentVrm.update(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight, false);
});

// ── API доступное из Android ────────────────────────────────────────────────
window.Miku = {
  loadVrm: (path) => loadVrm(path),
  setLipSync: (amp) => {
    if (!currentVrm?.expressionManager) return;
    const v = Math.max(0, Math.min(1, amp));
    currentVrm.expressionManager.setValue('aa', v);
  },
  setExpression: (name, value) => {
    if (!currentVrm?.expressionManager) return;
    currentVrm.expressionManager.setValue(name, Math.max(0, Math.min(1, value)));
  },
  setLookAt: (yawDeg, pitchDeg) => {
    if (!currentVrm?.humanoid) return;
    const head = currentVrm.humanoid.getNormalizedBoneNode('head');
    if (head) head.rotation.set(
      THREE.MathUtils.degToRad(pitchDeg),
      THREE.MathUtils.degToRad(yawDeg), 0);
  },
};

// Auto-load default Miku (через WebViewAssetLoader перехват → vrm/miku4.vrm)
loadVrm('../vrm/miku.vrm');

// Idle blink
setInterval(() => {
  if (!currentVrm?.expressionManager) return;
  currentVrm.expressionManager.setValue('blink', 1.0);
  setTimeout(() => currentVrm?.expressionManager?.setValue('blink', 0.0), 120);
}, 3500 + Math.random() * 2000);
</script>
</body>
</html>
